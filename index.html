<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR MIL 3D</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #eff6ff;
            border-radius: 8px;
            border: 1px solid #bfdbfe;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .total {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary-color);
            border-top: 1px solid #bfdbfe;
            padding-top: 10px;
        }

        /* Estilos do botão de imprimir */
        .btn-print {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
        }

        .btn-print:hover {
            background-color: #1d4ed8;
        }

        .footer {
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 20px;
        }

        /* Regras específicas para quando for imprimir ou salvar em PDF */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }
            .container {
                box-shadow: none;
                max-width: 100%;
                padding: 10px;
            }
            .btn-print {
                display: none; /* Esconde o botão no PDF */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Orçamento 3D</h1>

    <div class="form-group">
        <label>Selecione a Impressora</label>
        <select id="impressora">
            <option value="1.0">Impressora A (1.0 kW/h)</option>
            <option value="0.8">Impressora B (0.8 kW/h)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Filamento / Resina (Nome)</label>
        <input type="text" id="materialNome" placeholder="Ex: PLA Silk, Resina ABS Like">
    </div>
    <div class="form-group">
        <label>Preço do KG do Material (R$)</label>
        <input type="number" id="materialPreco" placeholder="0.00" step="0.01">
    </div>

    <div class="form-group">
        <label>Peso da Peça (gramas)</label>
        <input type="number" id="pesoPeca" placeholder="Ex: 150">
    </div>
    <div class="form-group">
        <label>Tempo de Impressão (Horas)</label>
        <input type="number" id="tempoImpressao" placeholder="Ex: 5">
    </div>

    <div class="form-group">
        <label>Custo Energia Local (R$ por kWh)</label>
        <input type="number" id="custoEnergiaKwh" value="0.85" step="0.01">
    </div>
    <div class="form-group">
        <label>Custos Variáveis (Cola, Álcool, Lixa - R$)</label>
        <input type="number" id="custosVariaveis" placeholder="0.00" step="0.01">
    </div>

    <div class="form-group">
        <label>Margem de Lucro (%)</label>
        <input type="number" id="margemLucro" value="100">
    </div>

    <div class="result-box">
        <div class="result-item">
            <span>Custo Material:</span>
            <span id="resMaterial">R$ 0,00</span>
        </div>
        <div class="result-item">
            <span>Custo Energia:</span>
            <span id="resEnergia">R$ 0,00</span>
        </div>
        <div class="result-item">
            <span>Variáveis:</span>
            <span id="resVariaveis">R$ 0,00</span>
        </div>
        <div class="result-item total">
            <span>Preço Sugerido:</span>
            <span id="resTotal">R$ 0,00</span>
        </div>
    </div>

    <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>

    <div class="footer">
        Ferramenta de Orçamento Interno v1.0
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('input, select');

    inputs.forEach(input => {
        input.addEventListener('input', calcular);
    });

    function calcular() {
        // Valores de entrada
        const consumoImpressora = parseFloat(document.getElementById('impressora').value);
        const precoKg = parseFloat(document.getElementById('materialPreco').value) || 0;
        const peso = parseFloat(document.getElementById('pesoPeca').value) || 0;
        const tempo = parseFloat(document.getElementById('tempoImpressao').value) || 0;
        const valorKwh = parseFloat(document.getElementById('custoEnergiaKwh').value) || 0;
        const variaveis = parseFloat(document.getElementById('custosVariaveis').value) || 0;
        const margem = parseFloat(document.getElementById('margemLucro').value) || 0;

        // Cálculos
        const custoMaterial = (peso / 1000) * precoKg;
        const custoEnergia = tempo * consumoImpressora * valorKwh;
        const custoBase = custoMaterial + custoEnergia + variaveis;
        const precoFinal = custoBase + (custoBase * (margem / 100));

        // Exibição
        document.getElementById('resMaterial').innerText = `R$ ${custoMaterial.toFixed(2)}`;
        document.getElementById('resEnergia').innerText = `R$ ${custoEnergia.toFixed(2)}`;
        document.getElementById('resVariaveis').innerText = `R$ ${variaveis.toFixed(2)}`;
        document.getElementById('resTotal').innerText = `R$ ${precoFinal.toFixed(2)}`;
    }
</script>

</body>
</html>
