<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR MIL 3D - Gestor de Orçamentos</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --success-color: #059669;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #eff6ff;
            border-radius: 8px;
            border: 1px solid #bfdbfe;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .total {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary-color);
            border-top: 1px solid #bfdbfe;
            padding-top: 10px;
        }

        /* Botões */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-client { background-color: var(--primary-color); color: white; }
        .btn-internal { background-color: var(--secondary-color); color: white; }
        .btn:hover { opacity: 0.9; }

        .image-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 180px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }

        .footer {
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 20px;
        }

        /* Visões de Impressão */
        #view-client-print { display: none; }

        /* ----- REGRAS DE IMPRESSÃO ----- */
        @media print {
            body { background-color: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; }
            .btn-group, .footer, #upload-section, h1, .form-group { display: none !important; }

            /* Se for impressão de CLIENTE */
            body.mode-client #view-admin-results { display: none !important; }
            body.mode-client #view-client-print { 
                display: block !important; 
                border: 2px solid #2563eb;
                padding: 20px;
                border-radius: 10px;
            }

            /* Se for impressão INTERNA */
            body.mode-internal #view-admin-results { 
                display: block !important; 
                border: 1px solid #64748b;
            }
            body.mode-internal .form-group { display: block !important; opacity: 0.7; }
            body.mode-internal input, body.mode-internal select { border: none; background: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="admin-inputs">
        <h1>VR MIL 3D</h1>

        <div class="form-group">
            <label>Impressora</label>
            <select id="impressora">
                <option value="1.0">Impressora A (1.0 kW/h)</option>
                <option value="0.8">Impressora B (0.8 kW/h)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Material (Filamento/Resina)</label>
            <input type="text" id="materialNome" placeholder="Ex: PLA Silk Azul">
        </div>

        <div class="form-group">
            <label>Preço do KG (R$)</label>
            <input type="number" id="materialPreco" step="0.01">
        </div>

        <div class="form-group">
            <label>Peso da Peça (g)</label>
            <input type="number" id="pesoPeca">
        </div>

        <div class="form-group">
            <label>Tempo de Impressão (Horas)</label>
            <input type="number" id="tempoImpressao">
        </div>

        <div class="form-group">
            <label>Custo Energia (R$/kWh)</label>
            <input type="number" id="custoEnergiaKwh" value="0.85">
        </div>

        <div class="form-group">
            <label>Custos Variáveis (R$)</label>
            <input type="number" id="custosVariaveis" placeholder="0.00">
        </div>

        <div class="form-group">
            <label>Margem de Lucro (%)</label>
            <input type="number" id="margemLucro" value="100">
        </div>

        <div id="upload-section" class="form-group">
            <label>Fotos da Peça</label>
            <input type="file" id="uploadImagens" accept="image/*" multiple>
        </div>
    </div>

    <div id="view-admin-results" class="result-box">
        <h3 style="text-align:center; margin-top:0;">Relatório Interno</h3>
        <div class="result-item"><span>Custo Material:</span> <span id="resMaterial">R$ 0,00</span></div>
        <div class="result-item"><span>Custo Energia:</span> <span id="resEnergia">R$ 0,00</span></div>
        <div class="result-item"><span>Variáveis:</span> <span id="resVariaveis">R$ 0,00</span></div>
        <div class="result-item total"><span>Preço Final:</span> <span id="resTotal">R$ 0,00</span></div>
    </div>

    <div id="view-client-print">
        <h1 style="color: #2563eb; margin-bottom: 5px;">VR MIL 3D</h1>
        <p style="text-align:center; font-style: italic;">Orçamento de Serviço de Impressão 3D</p>
        <hr>
        <p><strong>Modelo:</strong> <span id="clientMaterial">---</span></p>
        <p><strong>Prazo de Produção:</strong> <span id="clientTempo">0</span> horas de impressão</p>
        <div style="background: #eff6ff; padding: 20px; text-align: center; border-radius: 8px; margin: 20px 0;">
            <span style="font-size: 1.1rem; font-weight: bold;">Valor Total do Investimento:</span><br>
            <span id="clientTotal" style="font-size: 2rem; color: #2563eb; font-weight: bold;">R$ 0,00</span>
        </div>
    </div>

    <div id="previewImagens" class="image-preview"></div>

    <div class="btn-group">
        <button class="btn btn-client" onclick="gerarPDF('cliente')">🖨️ Gerar PDF p/ Cliente</button>
        <button class="btn btn-internal" onclick="gerarPDF('interno')">📂 Salvar Relatório Interno</button>
    </div>

    <div class="footer">VR MIL 3D - v1.1</div>
</div>

<script>
    const inputs = document.querySelectorAll('input, select');
    inputs.forEach(i => i.addEventListener('input', calcular));

    document.getElementById('uploadImagens').addEventListener('change', function(e) {
        const preview = document.getElementById('previewImagens');
        preview.innerHTML = '';
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = document.createElement('img');
                img.src = event.target.result;
                preview.appendChild(img);
            };
            reader.readAsDataURL(file);
        });
    });

    function calcular() {
        const consumo = parseFloat(document.getElementById('impressora').value);
        const precoKg = parseFloat(document.getElementById('materialPreco').value) || 0;
        const peso = parseFloat(document.getElementById('pesoPeca').value) || 0;
        const tempo = parseFloat(document.getElementById('tempoImpressao').value) || 0;
        const kwh = parseFloat(document.getElementById('custoEnergiaKwh').value) || 0;
        const vars = parseFloat(document.getElementById('custosVariaveis').value) || 0;
        const margem = parseFloat(document.getElementById('margemLucro').value) || 0;

        const cMaterial = (peso / 1000) * precoKg;
        const cEnergia = tempo * consumo * kwh;
        const cBase = cMaterial + cEnergia + vars;
        const pFinal = cBase + (cBase * (margem / 100));

        const formatado = pFinal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        // Atualiza tela interna
        document.getElementById('resMaterial').innerText = `R$ ${cMaterial.toFixed(2)}`;
        document.getElementById('resEnergia').innerText = `R$ ${cEnergia.toFixed(2)}`;
        document.getElementById('resVariaveis').innerText = `R$ ${vars.toFixed(2)}`;
        document.getElementById('resTotal').innerText = formatado;

        // Atualiza visão cliente
        document.getElementById('clientMaterial').innerText = document.getElementById('materialNome').value || "Não informado";
        document.getElementById('clientTempo').innerText = tempo;
        document.getElementById('clientTotal').innerText = formatado;
    }

    function gerarPDF(modo) {
        // Remove classes antigas
        document.body.classList.remove('mode-client', 'mode-internal');
        
        // Adiciona a classe do modo escolhido
        if(modo === 'cliente') {
            document.body.classList.add('mode-client');
        } else {
            document.body.classList.add('mode-internal');
        }

        // Chama a impressão
        window.print();
    }
</script>

</body>
</html>
